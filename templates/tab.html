{% extends "base.html" %}

{% block title %}
    Tab
{% endblock %}

{% block content %}

    <div class="top-container">
        <img src="
        {% if favorited %}
            {{ url_for('static', filename='img/star-filled.png') }}
        {% else %}
            {{ url_for('static', filename='img/star-empty.png') }}
        {% endif %}"
        alt="Favorite" class="star-icon"
        data-empty="{{ url_for('static', filename='img/star-empty.png') }}" 
        data-filled="{{ url_for('static', filename='img/star-filled.png') }}"
        data-id="{{ id }}">
        <h1 class="tab-title">{{ exercise }}</h1>
    </div>
    
    <div class="tab-container">
        <div id="notation">
        </div>
        <div class="playback-cursor"></div>
    </div>

    <div class="media-controls">
        <input type="number" name="bpm" id="bpm" placeholder="BPM" value="120" min="40" max="300">
        <button id="preview" class="preview-option">Play</button>
        <!-- Interrupt player -->
        <button id="preview-stop" class="preview-option">Stop</button>
        <!-- toggle loop -->
        <label>
        <input type="checkbox" id="loop">
        Loop
        </label>
        <p id="tabId" data-id="{{ id }}"></p>
        <input type="checkbox" id="metronome">
        <label for="metronome">Metronome</label>

    </div>
    </div>
    <input type="hidden" id="timeSignature" value="{{ time_signature }}">
{% endblock %}
